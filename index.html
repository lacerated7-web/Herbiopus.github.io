<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>欢迎回家</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; padding-top: 20%; }
        input { padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; background: #ff4757; color: white; }
    </style>
</head>
<body>
    <h2>输入我们的暗号</h2>
    <input type="password" id="pw" placeholder="你们的纪念日?">
    <button onclick="check()">开启</button>

    <script>
        function check() {
            var pass = document.getElementById('pw').value;
            // 这里设置你的密码，比如 20240520
            if (pass === '你的密码') {
                alert('欢迎进入！');
                // 验证成功后，你可以引导至真正的记录页面
                // window.location.href = "main.html"; 
            } else {
                alert('暗号不对哦，再想想？');
            }
        }
    </script>
</body>
</html>
