<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Private Access</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  
            background-image: url('cover/regent.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;

            padding-right: 10%; 
            box-sizing: border-box;
            background-color: #1a1a1a;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 320px;
            transition: all 0.3s ease;
        }

        h2 { 
            color: #ffffff; 
            font-weight: 300; 
            margin-bottom: 35px; 
            letter-spacing: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .input-group { 
            margin-bottom: 25px; 
            text-align: left; 
        }
        
        label { 
            color: #bbb; 
            font-size: 11px; 
            display: block; 
            margin-bottom: 8px; 
            margin-left: 5px; 
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #ff4757; 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #ff4757;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { 
            background: #ff6b81; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }

        .footer { 
            margin-top: 30px; 
            color: #888; 
            font-size: 10px; 
            letter-spacing: 1px; 
        }

        @media (max-width: 768px) {
            body {
                justify-content: center;
                padding-right: 0;
            }
            .login-card {
                width: 85%;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ACCESS</h2>
        
        <div class="input-group">
            <label>IDENTIFIER</label>
            <input type="text" id="username" placeholder="输入账号" autocomplete="off">
        </div>

        <div class="input-group">
            <label>ACCESS KEY</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button onclick="login()">VERIFY</button>

        <div class="footer">
            PRIVATE TERMINAL | 2026
        </div>
    </div>

    <script>
    function login() {
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value.trim();

    const userA = (u === 'admin' && p === '123456');
    const userB = (u === 'user' && p === '654321');

    if (userA || userB) {
        sessionStorage.setItem('access_token', 'entry_granted_0517');
        
        window.location.href = "private_0517_story.html"; 
    } else {
        alert('验证未通过，请检查暗号。');
    }
}

    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            login();
        }
    });
</script>
</body>
</html>
