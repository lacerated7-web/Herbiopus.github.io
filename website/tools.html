<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Wheel - Ethereal Style</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,300italic,400,400italic');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Source Sans Pro", Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #343d46;
            background-image: linear-gradient(45deg, #e37682 15%, #5f4d93 85%);
            color: #ffffff;
            overflow: hidden;
        }

        .main-card {
            display: flex;
            background: #ffffff;
            border-radius: 0.35rem;
            box-shadow: 0 3rem 5rem -2rem rgba(0, 0, 0, 0.5);
            width: 90vw;
            max-width: 850px;
            min-height: 450px;
            overflow: hidden;
            animation: card-entry 1s ease-out;
            color: #555;
        }

        @keyframes card-entry {
            from { opacity: 0; transform: translateX(2rem); }
            to { opacity: 1; transform: translateX(0); }
        }

        .side-panel {
            background: #f7f7f7;
            padding: 3rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: solid 1px #e5e5e5;
        }

        .wheel-panel {
            flex: 1.2;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h2 {
            color: #333;
            font-weight: 300;
            font-size: 1.75rem;
            letter-spacing: 0.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        h2 strong { font-weight: 400; color: #5f4d93; }

        select {
            appearance: none;
            background: #ffffff url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='40' height='40' preserveAspectRatio='none' viewBox='0 0 40 40'%3E%3Cpath d='M9.4,12.3l10.6,10.6l10.6-10.6l2.3,2.3L20,27.5L6.9,14.6L9.4,12.3z' fill='%23e5e5e5'/%3E%3C/svg%3E") no-repeat calc(100% - 0.5rem) center;
            background-size: 1.5rem;
            border: solid 1px #e5e5e5;
            border-radius: 0.35rem;
            color: #666;
            padding: 0.75rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 2rem;
        }

        select:focus { border-color: #5f4d93; }

        button {
            appearance: none;
            background: transparent;
            border: solid 1px #e5e5e5;
            border-radius: 0.35rem;
            color: #333;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.15rem;
            padding: 0.75rem 2rem;
            text-transform: uppercase;
            transition: all 0.2s;
            width: fit-content;
        }

        button:hover:not(:disabled) {
            border-color: #5f4d93;
            color: #5f4d93;
        }

        button:disabled { opacity: 0.5; cursor: default; }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        #wheelCanvas {
            filter: drop-shadow(0 0.5rem 1rem rgba(0,0,0,0.1));
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid #e37682;
            z-index: 10;
        }

        #resultDisplay {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: 300;
            color: #5f4d93;
            height: 1.5rem;
        }

        @media (max-width: 736px) {
            .main-card { flex-direction: column; height: auto; margin: 1rem; }
            .side-panel { padding: 2rem; border-right: none; border-bottom: solid 1px #e5e5e5; }
            .wheel-wrapper { width: 260px; height: 260px; }
            #wheelCanvas { width: 260px; height: 260px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="side-panel">
        <h2>有什么问题要解决？</strong></h2>
        <select id="questionSelect" onchange="updateWheel()"></select>
        <button id="spinBtn" onclick="startSpin()">试试这个！</button>
        <div id="resultDisplay"></div>
    </div>
    
    <div class="wheel-panel">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="320" height="320"></canvas>
        </div>
    </div>
</div>

<script>
    const dataSets = {
        "set_01": ["盖饭", "汉堡", "三明治+酸奶", "面条", "鸡柳"],
        "set_04": ["盖饭", "汉堡", "三明治+酸奶", "面条", "鸡柳","不吃了也行"],
        "set_02": ["408/802", "数学", "背单词",  "不知道"],
        "set_03": ["学习", "学习", "学习", "学习", "学习", "玩一会手机"]
    };

    const questionMap = [
        { text: "中午吃什么？", targetSet: "set_01" },
        { text: "晚上吃什么？", targetSet: "set_04" },
        { text: "待会学什么？", targetSet: "set_02" },
        { text: "现在干什么？", targetSet: "set_03" }
    ];

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const selectEl = document.getElementById('questionSelect');
    const resultEl = document.getElementById('resultDisplay');
    const spinBtn = document.getElementById('spinBtn');

    let currentItems = [];
    let currentRotation = 0;
    let isSpinning = false;

    const palette = ["#5f4d93", "#e37682", "#2184d0", "#47c16e", "#333333", "#f7f7f7"];

    function init() {
        questionMap.forEach(q => {
            const option = document.createElement('option');
            option.value = q.targetSet;
            option.textContent = q.text;
            selectEl.appendChild(option);
        });
        updateWheel();
    }

    function updateWheel() {
        if (isSpinning) return;
        currentItems = dataSets[selectEl.value];
        currentRotation = 0;
        drawWheel(0);
        resultEl.textContent = "";
    }

    function drawWheel(rotation) {
        const numItems = currentItems.length;
        const arcSize = (Math.PI * 2) / numItems;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(160, 160);
        ctx.rotate(rotation);

        for (let i = 0; i < numItems; i++) {
            const angle = i * arcSize;
            
            ctx.beginPath();
            ctx.fillStyle = palette[i % palette.length];
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, 155, angle, angle + arcSize);
            ctx.fill();
            
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.fillStyle = (palette[i % palette.length] === "#f7f7f7") ? "#333" : "#fff";
            ctx.font = "400 14px Source Sans Pro";
            ctx.rotate(angle + arcSize / 2);
            ctx.textAlign = "right";
            ctx.fillText(currentItems[i], 140, 5);
            ctx.restore();
        }
        ctx.restore();
    }

    function startSpin() {
        if (isSpinning) return;
        isSpinning = true;
        spinBtn.disabled = true;
        resultEl.textContent = "";

        const extraSpins = 8 + Math.random() * 5;
        const finalTargetRotation = currentRotation + (extraSpins * Math.PI * 2);
        
        let startTime = null;
        const duration = 4000;

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            const easeOut = 1 - Math.pow(1 - progress, 5);
            const rotation = currentRotation + (easeOut * (finalTargetRotation - currentRotation));
            
            drawWheel(rotation);

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                spinBtn.disabled = false;
                currentRotation = rotation % (Math.PI * 2);
                finalizeResult(rotation);
            }
        }
        requestAnimationFrame(animate);
    }

    function finalizeResult(finalRotation) {
        const numItems = currentItems.length;
        const arcSize = (Math.PI * 2) / numItems;
        const normalizedRotation = (finalRotation % (Math.PI * 2));
        let winningIndex = Math.floor(( (Math.PI * 2) - normalizedRotation + (Math.PI * 1.5) ) / arcSize) % numItems;
        resultEl.textContent = "它的建议是: " + currentItems[winningIndex];
    }

    init();
</script>

</body>
</html>
